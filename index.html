<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay & Khyati</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Matching the clean modern sans-serif look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf6f0; /* Exact warm cream tone from harpalsneh */
            --text-color: #2b2b2b;
            --accent-muted: #8c8c8c;
            --main-bg-image: url('main-background.png');
            --couple-portrait: url('jay-khyati.png');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Hero / Cover Page */
        .hero-section {
            background-image: linear-gradient(to bottom, rgba(250, 246, 240, 0.4), rgba(250, 246, 240, 0.85)), var(--main-bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hashtag {
            font-size: 0.85rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-color);
            margin-bottom: 30px;
            font-weight: 500;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .conjunction {
            font-size: 2rem;
            color: var(--accent-muted);
            margin: 10px 0;
            font-weight: 300;
        }

        .announcement-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-muted);
            margin-top: 15px;
            font-weight: 400;
        }

        /* Countdown Area */
        .countdown-container {
            display: flex;
            gap: 20px;
            margin: 45px 0;
        }

        .time-unit {
            min-width: 75px;
        }

        .time-unit span {
            display: block;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            color: var(--text-color);
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-muted);
            margin-top: 8px;
        }

        /* Event Info Block */
        .event-info {
            margin-top: 20px;
        }

        .wedding-date {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .wedding-venue {
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-muted);
            margin-top: 8px;
        }

        /* Image Profile Section replacing text narrative */
        .image-showcase-section {
            background-color: var(--bg-color);
            padding-bottom: 100px;
        }

        .portrait-frame {
            width: 260px;
            height: 340px;
            background-image: var(--couple-portrait);
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            background-color: #eeeada; /* visual fallback */
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .countdown-container { gap: 12px; }
            .time-unit span { font-size: 2rem; }
            .portrait-frame { width: 220px; height: 290px; }
        }
    </style>
</head>
<body>

    <!-- Main Screen Block -->
    <section class="hero-section">
        <div class="hashtag">#JayGotKhyati</div>
        
        <h1>Jay</h1>
        <div class="conjunction">&</div>
        <h1>Khyati</h1>
        
        <div class="announcement-text">Are Getting Married</div>

        <!-- System Countdown Timer Grid -->
        <div class="countdown-container">
            <div class="time-unit"><span id="days">00</span><div class="time-label">Days</div></div>
            <div class="time-unit"><span id="hours">00</span><div class="time-label">Hrs</div></div>
            <div class="time-unit"><span id="minutes">00</span><div class="time-label">Min</div></div>
            <div class="time-unit"><span id="seconds">00</span><div class="time-label">Sec</div></div>
        </div>

        <div class="event-info">
            <div class="wedding-date">27 . 03 . 2027</div>
            <div class="wedding-venue">Venue Coming Soon</div>
        </div>
    </section>

    <!-- Photo Only Section -->
    <section class="image-showcase-section">
        <div class="portrait-frame"></div>
    </section>

    <script>
        const targetDate = new Date("March 27, 2027 00:00:00").getTime();
        
        setInterval(function() {
            const current = new Date().getTime();
            const remainder = targetDate - current;

            document.getElementById("days").innerText = Math.floor(remainder / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((remainder % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((remainder % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((remainder % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
