<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay & Khyati • 27.03.27</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #faf6f0;
            --text-dark: #121212;
            --text-muted: #7a7a7a;
            --main-bg-image: url('main-background.png');
            --couple-portrait: url('jay-khyati.png');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            /* Activates full screen snap scrolling like harpalsneh */
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scroll-behavior: smooth;
        }

        /* Full Screen Slides */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background-color: var(--bg-cream);
        }

        /* Slide 1: Premium Title Cover */
        .slide-cover {
            background-image: linear-gradient(to bottom, rgba(250, 246, 240, 0.1), rgba(250, 246, 240, 0.8)), var(--main-bg-image);
            background-size: cover;
            background-position: center;
        }

        .hashtag {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: auto;
            padding-top: 40px;
        }

        .main-title-container {
            margin-auto: vertical;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .ampersand {
            font-size: 2.5rem;
            font-weight: 200;
            color: var(--text-muted);
            margin: 15px 0;
        }

        .sub-announcement {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 30px;
            font-weight: 400;
        }

        .scroll-indicator {
            margin-top: auto;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding-bottom: 20px;
            animation: pulse 2s infinite;
        }

        /* Slide 2: The Giant Countdown Clock */
        .slide-countdown {
            background-color: #111111;
            color: #ffffff;
        }

        .slide-countdown .hashtag {
            color: #ffffff;
            opacity: 0.6;
        }

        .countdown-grid {
            display: flex;
            gap: 40px;
            margin: auto 0;
        }

        .count-box {
            text-align: center;
        }

        .count-box .num {
            display: block;
            font-size: 6rem;
            font-weight: 200;
            letter-spacing: -3px;
            line-height: 1;
            color: #ffffff;
        }

        .count-box .label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888888;
            margin-top: 15px;
            font-weight: 500;
        }

        /* Slide 3: Meta Info & Portrait */
        .slide-details {
            background-color: var(--bg-cream);
        }

        .portrait-container {
            width: 280px;
            height: 380px;
            background-image: var(--couple-portrait);
            background-size: cover;
            background-position: center;
            border-radius: 2px;
            margin-bottom: 40px;
            background-color: #eaddd3;
        }

        .date-display {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .venue-display {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Fluid Mobile Optimization */
        @media (max-width: 768px) {
            h1 { font-size: 3.8rem; }
            .countdown-grid { gap: 20px; }
            .count-box .num { font-size: 3.5rem; }
            .portrait-container { width: 220px; height: 300px; }
            .date-display { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: Hero Editorial Cover -->
    <section class="slide-cover">
        <div class="hashtag">#JayGotKhyati</div>
        
        <div class="main-title-container">
            <h1>Jay</h1>
            <div class="ampersand">and</div>
            <h1>Khyati</h1>
            <div class="sub-announcement">Are Getting Married</div>
        </div>

        <div class="scroll-indicator">Scroll Down</div>
    </section>

    <!-- SCREEN 2: Immersive Black Countdown Screen -->
    <section class="slide-countdown">
        <div class="hashtag">The Countdown</div>
        
        <div class="countdown-grid">
            <div class="count-box"><span class="num" id="days">00</span><div class="label">Days</div></div>
            <div class="count-box"><span class="num" id="hours">00</span><div class="label">Hours</div></div>
            <div class="count-box"><span class="num" id="mins">00</span><div class="label">Mins</div></div>
            <div class="count-box"><span class="num" id="secs">00</span><div class="label">Secs</div></div>
        </div>

        <div class="scroll-indicator">Next</div>
    </section>

    <!-- SCREEN 3: Event Details & Main Image Display -->
    <section class="slide-details">
        <div class="portrait-container"></div>
        
        <div class="date-display">27 . 03 . 2027</div>
        <div class="venue-display">Venue Coming Soon</div>
    </section>

    <!-- Interactive Countdown Engine -->
    <script>
        const targetTimeline = new Date("March 27, 2027 00:00:00").getTime();
        
        setInterval(function() {
            const rightNow = new Date().getTime();
            const timeRemaining = targetTimeline - rightNow;

            const d = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const h = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((timeRemaining % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }, 1000);
    </script>
</body>
</html>
