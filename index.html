<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay & Khyati • 27.03.2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212; 
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --accent-gold: #cfb18c;
            --line-color: #333333;
            --main-bg-image: url('main-background.png');
            --font-style: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-style);
            background-color: var(--bg-dark);
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(18, 18, 18, 0.75), rgba(18, 18, 18, 0.95)), var(--main-bg-image);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .names-container {
            margin-top: 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .ampersand {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text-muted);
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .announcement {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 30px;
            font-weight: 400;
        }

        .line-divider {
            width: 1px;
            height: 60px;
            background-color: var(--line-color);
            margin: 45px auto;
        }

        .event-meta {
            margin-bottom: 40px;
        }

        .date-string {
            font-size: 2.2rem;
            font-weight: 200;
            letter-spacing: 4px;
            color: var(--accent-gold);
        }

        /* Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 40px 0;
            width: 100%;
        }

        .count-box .num {
            display: block;
            font-size: 3.2rem;
            font-weight: 200;
            letter-spacing: -1px;
            line-height: 1;
            color: var(--text-light);
        }

        .count-box .label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 12px;
            font-weight: 400;
        }

        /* Sleek Vector Audio Controls Toggle Layout */
        .audio-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-light);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .audio-control svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: fill 0.3s ease;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            body { padding: 40px 16px; }
            h1 { font-size: 3.2rem; }
            .count-box .num { font-size: 2.2rem; }
            .date-string { font-size: 1.8rem; }
            .audio-control { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <!-- Minimal Custom SVG Music Vector Toggle -->
    <button class="audio-control" id="musicBtn" onclick="toggleAudio()" aria-label="Toggle Audio">
        <svg id="audioIcon" viewBox="0 0 24 24">
            <path d="M6 9H2v6h4l5 5V4L6 9zm10.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </button>
    
    <audio id="weddingAudio" loop>
        <source src="wedding-song.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        
        <div class="names-container">
            <h1>Jay</h1>
            <div class="ampersand">and</div>
            <h1>Khyati</h1>
            <div class="announcement">Are Getting Married</div>
        </div>

        <div class="line-divider"></div>

        <!-- Date Block (Moved Up) -->
        <div class="event-meta">
            <div class="date-string">27 . 03 . 2027</div>
        </div>

        <!-- Timer Grid (Moved Down) -->
        <div class="countdown-grid">
            <div class="count-box"><span class="num" id="days">00</span><div class="label">Days</div></div>
            <div class="count-box"><span class="num" id="hours">00</span><div class="label">Hours</div></div>
            <div class="count-box"><span class="num" id="mins">00</span><div class="label">Mins</div></div>
            <div class="count-box"><span class="num" id="secs">00</span><div class="label">Secs</div></div>
        </div>
    </div>

    <script>
        const weddingTimestamp = new Date("March 27, 2027 00:00:00").getTime();
        
        function refreshClock() {
            const now = new Date().getTime();
            const gap = weddingTimestamp - now;

            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("mins").innerText = mins < 10 ? "0" + mins : mins;
            document.getElementById("secs").innerText = secs < 10 ? "0" + secs : secs;
        }
        
        setInterval(refreshClock, 1000);
        refreshClock();

        const audio = document.getElementById("weddingAudio");
        const icon = document.getElementById("audioIcon");

        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().then(() => updateIcon(true)).catch(e => console.log("Audio handling context updated."));
            }
        }, { once: true });

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                updateIcon(true);
            } else {
                audio.pause();
                updateIcon(false);
            }
        }

        function updateIcon(isPlaying) {
            if (isPlaying) {
                icon.innerHTML = '<path d="M6 9H2v6h4l5 5V4L6 9zm10.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
            } else {
                icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
            }
        }
    </script>
</body>
</html>
