<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay & Khyati • Save The Date</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #faf6f0;
            --text-dark: #121212;
            --text-muted: #7a7a7a;
            --line-color: #e6dfd5;
            --main-bg-image: url('main-background.png');
            --couple-portrait: url('jay-khyati.png');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Main Container matching the premium centered card look */
        .wrapper {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .hashtag {
            font-size: 0.75rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 40px;
        }

        /* Large Clean Names Layout */
        .names-container {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
            text-transform: none;
        }

        .ampersand {
            font-size: 2rem;
            font-weight: 200;
            color: var(--text-muted);
            margin: 12px 0;
        }

        .announcement {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 25px;
            font-weight: 400;
        }

        /* Elegant Thin Divider Lines */
        .line-divider {
            width: 1px;
            height: 50px;
            background-color: var(--line-color);
            margin: 40px auto;
        }

        /* Massive Clean Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 40px 0;
            width: 100%;
        }

        .count-box .num {
            display: block;
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: -1px;
            line-height: 1;
        }

        .count-box .label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 400;
        }

        /* Featured Portrait Box Container */
        .portrait-wrapper {
            width: 100%;
            height: 450px;
            background-image: var(--main-bg-image); /* Uses your main background asset */
            background-size: cover;
            background-position: center;
            margin: 50px 0;
            background-color: #eae3d8; /* Fallback placeholder color */
            border-radius: 2px;
        }

        /* Event Details Layout */
        .event-meta {
            margin-top: 40px;
        }

        .date-string {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .venue-string {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Mobile Scale Overrides */
        @media (max-width: 480px) {
            body { padding: 40px 16px; }
            h1 { font-size: 3.5rem; }
            .count-box .num { font-size: 2.2rem; }
            .portrait-wrapper { height: 350px; margin: 40px 0; }
            .date-string { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Top Custom Tag -->
        <div class="hashtag">#JayGotKhyati</div>
        
        <!-- Center Names Stack -->
        <div class="names-container">
            <h1>Jay</h1>
            <div class="ampersand">and</div>
            <h1>Khyati</h1>
            <div class="announcement">Are Getting Married</div>
        </div>

        <div class="line-divider"></div>

        <!-- System Clock Component -->
        <div class="countdown-grid">
            <div class="count-box"><span class="num" id="days">00</span><div class="label">Days</div></div>
            <div class="count-box"><span class="num" id="hours">00</span><div class="label">Hours</div></div>
            <div class="count-box"><span class="num" id="mins">00</span><div class="label">Mins</div></div>
            <div class="count-box"><span class="num" id="secs">00</span><div class="label">Secs</div></div>
        </div>

        <!-- Clean Graphic Section Placeholder -->
        <div class="portrait-wrapper"></div>

        <div class="line-divider"></div>

        <!-- Date / Venue Block -->
        <div class="event-meta">
            <div class="date-string">27 . 03 . 2027</div>
            <div class="venue-string">Venue Coming Soon</div>
        </div>
    </div>

    <!-- Clock Synchronization Loop -->
    <script>
        const weddingTimestamp = new Date("March 27, 2027 00:00:00").getTime();
        
        function refreshClock() {
            const now = new Date().getTime();
            const gap = weddingTimestamp - now;

            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("mins").innerText = mins < 10 ? "0" + mins : mins;
            document.getElementById("secs").innerText = secs < 10 ? "0" + secs : secs;
        }
        
        setInterval(refreshClock, 1000);
        refreshClock(); // immediate execution on mount
    </script>
</body>
</html>
