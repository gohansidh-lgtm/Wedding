<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khyati & Jay • 27.03.2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212; 
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --accent-gold: #cfb18c;
            --line-color: #333333;
            --font-style: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-style);
            background-color: var(--bg-dark);
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* PHOTO CONTAINER FIXED */
        .photo-card {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 30px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(207, 177, 140, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .names-container {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .ampersand {
            font-size: 2.8rem;
            font-weight: 200;
            color: var(--accent-gold);
            margin: 5px 0;
            letter-spacing: 2px;
        }

        .announcement {
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-top: 25px;
            font-weight: 400;
        }

        .line-divider {
            width: 1px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 35px auto;
        }

        .event-meta {
            margin-bottom: 40px;
        }

        .date-string {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 4px;
            color: var(--accent-gold);
        }

        .location {
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffffff;
            margin-top: 15px;
        }

        /* Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 30px 0;
            width: 100%;
        }

        .count-box .num {
            display: block;
            font-size: 2.8rem;
            font-weight: 200;
            letter-spacing: -1px;
            line-height: 1;
            color: var(--text-light);
        }

        .count-box .label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Audio Control Link */
        .audio-link {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            user-select: none;
            transition: color 0.2s ease;
        }

        .audio-link:hover {
            color: rgba(255, 255, 255, 1);
        }

        .audio-link svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        @media (max-width: 480px) {
            body { padding: 30px 16px; }
            h1 { font-size: 3rem; }
            .ampersand { font-size: 2.2rem; }
            .count-box .num { font-size: 2.2rem; }
            .date-string { font-size: 1.6rem; }
            .audio-link { bottom: 20px; right: 20px; }
            .photo-card { max-width: 280px; }
        }
    </style>
</head>
<body>

    <!-- Audio Link -->
    <div class="audio-link" id="audioToggle" onclick="toggleAudio()" aria-label="Toggle Audio">
        <svg id="audioIcon" viewBox="0 0 24 24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
        <span id="audioStatusText">Tap to Play</span>
    </div>
    
    <audio id="weddingAudio" loop preload="auto" autoplay>
        <source src="wedding-song.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        
        <!-- PHOTO CARD PLACEMENT -->
        <div class="photo-card">
            <img src="main-background-2.jpg" alt="Khyati & Jay">
        </div>

        <div class="names-container">
            <h1>Khyati</h1>
            <div class="ampersand">&amp;</div>
            <h1>Jay</h1>
            <div class="announcement">are getting married</div>
        </div>

        <div class="line-divider"></div>

        <!-- Date & Location Block -->
        <div class="event-meta">
            <div class="date-string">27 . 03 . 2027</div>
            <div class="location">Mumbai</div>
        </div>

        <!-- Timer Grid -->
        <div class="countdown-grid">
            <div class="count-box"><span class="num" id="days">00</span><div class="label">Days</div></div>
            <div class="count-box"><span class="num" id="hours">00</span><div class="label">Hours</div></div>
            <div class="count-box"><span class="num" id="mins">00</span><div class="label">Mins</div></div>
            <div class="count-box"><span class="num" id="secs">00</span><div class="label">Secs</div></div>
        </div>
    </div>

    <script>
        const weddingTimestamp = new Date("March 27, 2027 00:00:00").getTime();
        
        function refreshClock() {
            const now = new Date().getTime();
            const gap = weddingTimestamp - now;

            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("mins").innerText = mins < 10 ? "0" + mins : mins;
            document.getElementById("secs").innerText = secs < 10 ? "0" + secs : secs;
        }
        
        setInterval(refreshClock, 1000);
        refreshClock();

        const audio = document.getElementById("weddingAudio");
        const icon = document.getElementById("audioIcon");
        const statusText = document.getElementById("audioStatusText");

        window.addEventListener('DOMContentLoaded', () => {
            audio.play().then(() => {
                updateAudioUI(true);
            }).catch(e => console.log("Autoplay paused. Awaiting interaction."));
        });

        function triggerAutoplayFallback() {
            if (audio.paused) {
                audio.play().then(() => {
                    updateAudioUI(true);
                    removeAllInteractionListeners();
                }).catch(err => console.log("Awaiting link interaction..."));
            } else {
                removeAllInteractionListeners();
            }
        }

        document.addEventListener('click', triggerAutoplayFallback, { passive: true });
        document.addEventListener('touchstart', triggerAutoplayFallback, { passive: true });
        document.addEventListener('scroll', triggerAutoplayFallback, { passive: true });

        function removeAllInteractionListeners() {
            document.removeEventListener('click', triggerAutoplayFallback);
            document.removeEventListener('touchstart', triggerAutoplayFallback);
            document.removeEventListener('scroll', triggerAutoplayFallback);
        }

        function toggleAudio() {
            removeAllInteractionListeners(); 
            if (audio.paused) {
                audio.play();
                updateAudioUI(true);
            } else {
                audio.pause();
                updateAudioUI(false);
            }
        }

        function updateAudioUI(isPlaying) {
            if (isPlaying) {
                icon.innerHTML = '<path d="M6 9H2v6h4l5 5V4L6 9zm10.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
                statusText.innerText = "Mute";
            } else {
                icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                statusText.innerText = "Tap to Play";
            }
        }
    </script>
</body>
</html>
